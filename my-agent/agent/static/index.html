<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Agent — Dashboard</title>
<style>
  :root {
    --bg: #1c1c1e; --surface: #2c2c2e; --border: #3a3a3c;
    --text: #f5f5f7; --text-dim: #8e8e93; --accent: #0a84ff;
    --green: #30d158; --orange: #ff9f0a; --red: #ff453a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
  .sticky-header { position: sticky; top: 0; z-index: 100; background: var(--bg); padding-bottom: 12px; }
  h1 { font-size: 1.4em; margin-bottom: 20px; }
  h2 { font-size: 1.1em; margin-bottom: 12px; color: var(--text-dim); }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; color: var(--text-dim); font-size: 0.9em; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .card { background: var(--surface); border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid var(--border); }
  .subtabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .subtab { padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; cursor: pointer; color: var(--text-dim); font-size: 0.85em; }
  .subtab.active { background: rgba(10, 132, 255, 0.15); color: #fff; border-color: var(--accent); }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .stat-box { background: var(--bg); border-radius: 8px; padding: 12px; }
  .stat-label { font-size: 0.8em; color: var(--text-dim); }
  .stat-value { font-size: 1.4em; font-weight: 600; margin-top: 4px; }
  .stat-value .cached { color: var(--green); font-size: 0.7em; }
  .stat-cost { color: var(--orange); font-size: 0.9em; margin-top: 2px; }

  .msg { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .msg:last-child { border-bottom: none; }
  .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .msg-role { font-size: 0.75em; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .msg-role.user { background: var(--accent); color: #fff; }
  .msg-role.assistant { background: #5856d6; color: #fff; }
  .msg-chat { font-size: 0.7em; padding: 2px 8px; border-radius: 999px; background: rgba(255, 255, 255, 0.08); color: var(--text-dim); font-weight: 600; }
  .msg-time { font-size: 0.75em; color: var(--text-dim); }
  .msg-model { font-size: 0.65em; padding: 1px 6px; border-radius: 4px; background: rgba(255, 159, 10, 0.15); color: var(--orange); font-weight: 600; margin-left: 4px; }
  .msg-content { font-size: 0.9em; white-space: pre-wrap; word-break: break-word; }

  .tool-call { background: var(--bg); border-radius: 8px; padding: 8px 12px; margin: 6px 0; font-size: 0.85em; border-left: 3px solid var(--orange); }
  .tool-call .name { font-weight: 600; color: var(--orange); }
  .tool-call .duration { color: var(--text-dim); font-size: 0.8em; }
  .tool-call .result { color: var(--text-dim); margin-top: 4px; max-height: 80px; overflow: hidden; cursor: pointer; }
  .tool-call .result.expanded { max-height: none; }
  .tool-call .fail { border-left-color: var(--red); }

  table { width: 100%; border-collapse: collapse; font-size: 0.85em; table-layout: fixed; }
  th { text-align: left; color: var(--text-dim); padding: 6px 8px; border-bottom: 1px solid var(--border); }
  td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  td:first-child, td:last-child { white-space: nowrap; }
  .success { color: var(--green); }
  .failure { color: var(--red); }
  .table-text { white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
  .expandable-cell {
    display: flex;
    align-items: baseline;
    flex-wrap: nowrap;
    width: 100%;
    padding: 0;
    border: none;
    background: none;
    color: inherit;
    font: inherit;
    text-align: left;
    cursor: pointer;
  }
  .expandable-cell.expanded { display: block; }
  .expandable-cell:hover .expandable-hint,
  .expandable-cell:focus-visible .expandable-hint { color: #fff; }
  .expandable-cell:focus-visible {
    outline: 2px solid rgba(10, 132, 255, 0.45);
    outline-offset: 2px;
    border-radius: 6px;
  }
  .expandable-preview {
    display: block;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .expandable-cell.multi-line .expandable-preview { white-space: nowrap; }
  .expandable-full { display: none; }
  .expandable-cell.expanded .expandable-preview { display: none; }
  .expandable-cell.expanded .expandable-full {
    display: block;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .expandable-hint {
    display: inline;
    margin-left: 6px;
    color: var(--accent);
    font-size: 0.82em;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .load-more { display: block; width: 100%; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--accent); cursor: pointer; text-align: center; margin-top: 12px; }

  .period-select { margin-bottom: 12px; }
  select { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; }

  .status-pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75em; font-weight: 600; }
  .status-pill.active { background: rgba(48, 209, 88, 0.15); color: var(--green); }
  .status-pill.archived { background: rgba(255, 159, 10, 0.15); color: var(--orange); }
  .status-pill.cancelled { background: rgba(255, 69, 58, 0.15); color: var(--red); }

  #section-stats, #section-messages, #section-tools, #section-reminders { display: none; }
  #section-stats.active, #section-messages.active, #section-tools.active, #section-reminders.active { display: block; }
</style>
</head>
<body>
<div class="sticky-header">
  <h1>My Agent</h1>
  <div class="tabs">
    <div class="tab active" data-section="stats">Tokens</div>
    <div class="tab" data-section="messages">Messages</div>
    <div class="tab" data-section="tools">Tool Calls</div>
    <div class="tab" data-section="reminders">Reminders</div>
  </div>
</div>

<!-- TOKENS -->
<div id="section-stats" class="active">
  <div class="period-select">
    <select id="stats-period">
      <option value="day">Par jour</option>
      <option value="week">Par semaine</option>
      <option value="month">Par mois</option>
    </select>
  </div>
  <div id="stats-container"></div>
</div>

<!-- MESSAGES -->
<div id="section-messages">
  <div class="subtabs" id="messages-chat-tabs"></div>
  <div id="messages-container"></div>
  <button class="load-more" id="load-more-messages">Charger plus...</button>
</div>

<!-- TOOL CALLS -->
<div id="section-tools">
  <div class="card">
    <div class="subtabs" id="tools-chat-tabs"></div>
    <table>
      <colgroup><col style="width:10%"><col style="width:15%"><col style="width:15%"><col style="width:42%"><col style="width:8%"><col style="width:10%"></colgroup>
      <thead><tr><th>Heure</th><th>Chat ID</th><th>Tool</th><th>Input</th><th>Status</th><th>Duree</th></tr></thead>
      <tbody id="tools-tbody"></tbody>
    </table>
  </div>
</div>

<!-- REMINDERS -->
<div id="section-reminders">
  <div class="card">
    <div class="period-select">
      <select id="reminders-status">
        <option value="">Tous</option>
        <option value="active">Actifs</option>
        <option value="archived">Archives</option>
        <option value="cancelled">Annules</option>
      </select>
    </div>
    <table>
      <colgroup><col style="width:4%"><col style="width:6%"><col style="width:7%"><col style="width:16%"><col style="width:35%"><col style="width:11%"><col style="width:11%"><col style="width:11%"></colgroup>
      <thead><tr><th>ID</th><th>Chat</th><th>Status</th><th>Titre</th><th>Instruction</th><th>Prochaine</th><th>Derniere</th><th>Archivee</th></tr></thead>
      <tbody id="reminders-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const API = ".";
let msgOffset = 0;
const MSG_LIMIT = 50;
let knownChats = [];
let selectedChatId = "";

// --- Mock data (used only when API is unreachable, i.e. local dev) ---

    { period: "2026-04-10", model: "gpt-4o", input_tokens: 35600, output_tokens: 9800, cached_tokens: 22000, estimated_cost: 0.31 },
    { period: "2026-04-09", model: "gpt-4o", input_tokens: 61000, output_tokens: 15200, cached_tokens: 40500, estimated_cost: 0.58 },
  ]},
  messages: {
    messages: [
      { chat_id: -1001234567890, role: "assistant", timestamp: "2026-04-11T22:27:05Z", content: "La température dans le salon est de 21.3°C avec une humidité de 45%." },
      { chat_id: -1001234567890, role: "user", timestamp: "2026-04-11T22:27:00Z", content: "Quelle est la température dans le salon ?" },
      { chat_id: -1001234567890, role: "assistant", timestamp: "2026-04-11T22:15:03Z", content: "C'est fait, la lumière du bureau est allumée 💡" },
      { chat_id: -1001234567890, role: "user", timestamp: "2026-04-11T22:15:00Z", content: "[Message vocal transcrit]  Allume la lumière du bureau." },

      { chat_id: 123456789, role: "user", timestamp: "2026-04-10T19:30:00Z", content: "Quel temps fait-il dehors ?" },
      { chat_id: -1001234567890, role: "assistant", timestamp: "2026-04-10T19:30:08Z", content: "Rappel créé : \"Sortir les poubelles\" programmé pour demain à 08:00." },
      { chat_id: -1001234567890, role: "user", timestamp: "2026-04-10T19:30:00Z", content: "Programme un rappel pour sortir les poubelles demain à 8h." },

      { chat_id: -1001234567890, timestamp: "2026-04-11T22:27:02Z", tool_name: "exec", output_summary: "temperature: 21.3\nhumidity: 45", success: true, duration_ms: 180 },
      { chat_id: -1001234567890, timestamp: "2026-04-11T22:15:02Z", tool_name: "exec", output_summary: "Service light.turn_on called", success: true, duration_ms: 95 },
      { chat_id: -1001234567890, timestamp: "2026-04-10T19:30:02Z", tool_name: "create_reminder", output_summary: '{"id": 12, "title": "Sortir les poubelles", "status": "active"}', success: true, duration_ms: 15 },
      { chat_id: 123456789, timestamp: "2026-04-10T19:30:02Z", tool_name: "web_fetch", output_summary: "current_weather: 14C clear", success: true, duration_ms: 420 },
    ]
  },
  tool_calls: { tool_calls: [
    { chat_id: -1001234567890, timestamp: "2026-04-11T22:27:02Z", tool_name: "exec", input_summary: "{'command': 'curl -s http://supervisor/core/api/states/sensor.salon_temperature -H \"Authorization: Bearer $TOKEN\" | jq .state'}", success: true, duration_ms: 180 },
    { chat_id: -1001234567890, timestamp: "2026-04-11T22:15:02Z", tool_name: "exec", input_summary: "{'command': 'curl -s -X POST http://supervisor/core/api/services/light/turn_on -H \"Authorization: Bearer $TOKEN\" -d {\"entity_id\": \"light.bureau\"}'}", success: true, duration_ms: 95 },
    { chat_id: -1001234567890, timestamp: "2026-04-10T19:30:02Z", tool_name: "create_reminder", input_summary: "{'title': 'Sortir les poubelles', 'instruction': 'Envoyer un message : Sortir les poubelles !', 'schedule_kind': 'once', 'run_at': '2026-04-12 08:00'}", success: true, duration_ms: 15 },
    { chat_id: 123456789, timestamp: "2026-04-10T19:30:03Z", tool_name: "web_fetch", input_summary: "{'url': 'https://api.open-meteo.com/v1/forecast?latitude=48.85&longitude=2.35&current_weather=true'}", success: true, duration_ms: 420 },
    { chat_id: 123456789, timestamp: "2026-04-10T18:00:00Z", tool_name: "read_file", input_summary: "{'path': '/share/myagent/workspace/MEMORY.md'}", success: true, duration_ms: 8 },
    { chat_id: -1001234567890, timestamp: "2026-04-10T14:22:00Z", tool_name: "exec", input_summary: "{'command': 'ls -la /share/myagent/workspace/skills/'}", success: true, duration_ms: 32 },
    { chat_id: 123456789, timestamp: "2026-04-09T23:10:00Z", tool_name: "web_search", input_summary: "{'query': 'recette tarte aux pommes rapide'}", success: true, duration_ms: 1250 },
    { chat_id: -1001234567890, timestamp: "2026-04-09T22:41:00Z", tool_name: "create_reminder", input_summary: "{'title': 'Proposition activités week-end (vendredi)', 'instruction': 'Exécuter le cron de vendredi du skill activity-planner : lire events.json, filtrer les événements du week-end et envoyer les suggestions'}", success: false, duration_ms: 6 },
  ]},
  reminders: { reminders: [
    { id: 12, chat_id: 123456, status: "active", title: "Sortir les poubelles", instruction: "Envoyer un message : Sortir les poubelles !", next_run_at: "2026-04-12T06:00:00Z", last_run_at: null, archived_at: null },
    { id: 10, chat_id: 123456, status: "active", title: "Briefing météo quotidien", instruction: "Consulter la météo et envoyer un résumé matinal avec la tenue recommandée", next_run_at: "2026-04-12T05:30:00Z", last_run_at: "2026-04-11T05:30:00Z", archived_at: null },
    { id: 8, chat_id: 123456, status: "active", title: "Suggestions activités week-end", instruction: "Exécuter le cron du vendredi du skill activity-planner : lire events.json et proposer des activités", next_run_at: "2026-04-18T16:00:00Z", last_run_at: "2026-04-11T16:00:00Z", archived_at: null },
    { id: 5, chat_id: 123456, status: "archived", title: "Rappel de test", instruction: "Envoyer un message dans ce chat : Rappel de test", next_run_at: null, last_run_at: "2026-04-09T06:30:00Z", archived_at: "2026-04-09T06:30:00Z" },
  ]}
};

async function fetchOrMock(url, mockKey) {
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    return await resp.json();
  } catch {
    return MOCK[mockKey];
  }
}

// --- Tabs ---
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll("[id^='section-']").forEach(s => s.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("section-" + tab.dataset.section).classList.add("active");
  });
});

// --- Stats ---
async function loadStats() {
  const period = document.getElementById("stats-period").value;
  const json = await fetchOrMock(`${API}/api/stats?period=${period}`, "stats");
  const container = document.getElementById("stats-container");

  if (!json.data.length) {
    container.innerHTML = '<div class="card"><p style="color:var(--text-dim)">Pas encore de donnees.</p></div>';
    return;
  }

  let html = '<div class="stats-grid">';
  json.data.forEach(d => {
    html += `<div class="stat-box">
      <div class="stat-label">${d.period} · <span class="msg-model">${escapeHtml(d.model)}</span></div>
      <div class="stat-value">${fmt(d.input_tokens)} in / ${fmt(d.output_tokens)} out</div>
      <div class="stat-value"><span class="cached">${fmt(d.cached_tokens)} cached</span></div>
      <div class="stat-cost">$${d.estimated_cost.toFixed(4)}</div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function fmt(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(1) + "k";
  return n.toString();
}

document.getElementById("stats-period").addEventListener("change", loadStats);

function getChatQueryParam() {
  return selectedChatId ? `chat_id=${encodeURIComponent(selectedChatId)}` : "";
}

function chatMinuteKey(chatId, timestamp) {
  return `${chatId}:${timestamp.substring(0, 16)}`;
}

function renderChatTabs(containerId) {
  const container = document.getElementById(containerId);
  const tabs = [{ label: "Tous", value: "" }, ...knownChats.map(chat => ({ label: String(chat.chat_id), value: String(chat.chat_id) }))];
  container.innerHTML = tabs.map(tab => `
    <button type="button" class="subtab${selectedChatId === tab.value ? " active" : ""}" data-chat-id="${escapeHtml(tab.value)}">
      ${escapeHtml(tab.label)}
    </button>
  `).join("");

  container.querySelectorAll(".subtab").forEach(button => {
    button.addEventListener("click", () => {
      selectedChatId = button.dataset.chatId || "";
      renderAllChatTabs();
      loadMessages(false);
      loadToolCalls();
    });
  });
}

function renderAllChatTabs() {
  renderChatTabs("messages-chat-tabs");
  renderChatTabs("tools-chat-tabs");
}

async function loadChats() {
  const json = await fetchOrMock(`${API}/api/chats`, "chats");
  knownChats = json.chats || [];
  renderAllChatTabs();
}

// --- Messages ---
async function loadMessages(append) {
  const limit = MSG_LIMIT;
  const chatParam = getChatQueryParam();
  const query = chatParam ? `?limit=${limit}&${chatParam}` : `?limit=${limit}`;
  const json = await fetchOrMock(`${API}/api/messages${query}`, "messages");
  const container = document.getElementById("messages-container");
  const messages = selectedChatId ? (json.messages || []).filter(m => String(m.chat_id) === selectedChatId) : (json.messages || []);
  const toolCalls = selectedChatId ? (json.tool_calls || []).filter(tc => String(tc.chat_id) === selectedChatId) : (json.tool_calls || []);

  if (!append) container.innerHTML = "";

  const toolMap = {};
  toolCalls.forEach(tc => {
    const key = chatMinuteKey(tc.chat_id, tc.timestamp);
    if (!toolMap[key]) toolMap[key] = [];
    toolMap[key].push(tc);
  });

  let html = "";
  messages.forEach(m => {
    const time = new Date(m.timestamp).toLocaleString("fr-FR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
    const roleClass = m.role;
    const icon = m.role === "user" ? "👤" : "🤖";
    const modelBadge = (m.role === "assistant" && m.model) ? `<span class="msg-model">${escapeHtml(m.model)}</span>` : "";
    const chatBadge = `<span class="msg-chat">Chat ${escapeHtml(String(m.chat_id))}</span>`;
    html += `<div class="msg">
      <div class="msg-header">
        <span class="msg-role ${roleClass}">${icon} ${m.role}</span>
        ${chatBadge}
        <span class="msg-time">${time}</span>
        ${modelBadge}
      </div>
      <div class="msg-content">${escapeHtml(m.content)}</div>`;

    // Attach tool calls near assistant messages
    if (m.role === "assistant") {
      const key = chatMinuteKey(m.chat_id, m.timestamp);
      const calls = toolMap[key] || [];
      calls.forEach(tc => {
        const statusClass = tc.success ? "" : "fail";
        html += `<div class="tool-call ${statusClass}">
          <span class="name">🔧 ${tc.tool_name}</span>
          <span class="duration">${tc.duration_ms}ms</span>
          <div class="result" onclick="this.classList.toggle('expanded')">${escapeHtml(tc.output_summary || "")}</div>
        </div>`;
      });
    }

    html += `</div>`;
  });

  container.innerHTML += html || '<p style="color:var(--text-dim)">Pas de messages.</p>';
}

// --- Tool Calls ---
async function loadToolCalls() {
  const chatParam = getChatQueryParam();
  const query = chatParam ? `?limit=50&${chatParam}` : "?limit=50";
  const json = await fetchOrMock(`${API}/api/tool_calls${query}`, "tool_calls");
  const tbody = document.getElementById("tools-tbody");
  const toolCalls = selectedChatId ? (json.tool_calls || []).filter(tc => String(tc.chat_id) === selectedChatId) : (json.tool_calls || []);

  if (!toolCalls.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="color:var(--text-dim)">Pas de tool calls.</td></tr>';
    return;
  }

  let html = "";
  toolCalls.forEach(tc => {
    const time = new Date(tc.timestamp).toLocaleString("fr-FR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
    const status = tc.success ? '<span class="success">✓</span>' : '<span class="failure">✗</span>';
    html += `<tr>
      <td>${time}</td>
      <td>${tc.chat_id}</td>
      <td>${tc.tool_name}</td>
      <td class="table-text">${renderExpandableCell(tc.input_summary || "", { previewChars: 60 })}</td>
      <td>${status}</td>
      <td>${tc.duration_ms}ms</td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

// --- Reminders ---
async function loadReminders() {
  const status = document.getElementById("reminders-status").value;
  const query = status ? `?status=${encodeURIComponent(status)}` : "";
  const json = await fetchOrMock(`${API}/api/reminders${query}`, "reminders");
  const tbody = document.getElementById("reminders-tbody");

  if (!json.reminders.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="color:var(--text-dim)">Pas de reminders.</td></tr>';
    return;
  }

  let html = "";
  json.reminders.forEach(reminder => {
    html += `<tr>
      <td>#${reminder.id}</td>
      <td>${reminder.chat_id}</td>
      <td><span class="status-pill ${reminder.status}">${reminder.status}</span></td>
      <td>${escapeHtml(reminder.title)}</td>
      <td class="table-text">${renderExpandableCell(reminder.instruction || "", { previewChars: 70, multiLine: true })}</td>
      <td>${fmtDateTime(reminder.next_run_at)}</td>
      <td>${fmtDateTime(reminder.last_run_at)}</td>
      <td>${fmtDateTime(reminder.archived_at)}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function renderExpandableCell(text, options = {}) {
  const value = text || "";
  if (!value) return "-";

  const { previewChars = 70, multiLine = false } = options;
  if (value.length <= previewChars) return escapeHtml(value);

  const safe = escapeHtml(value);
  const multiLineClass = multiLine ? " multi-line" : "";
  return `<button type="button" class="expandable-cell${multiLineClass}" aria-expanded="false" onclick="toggleExpandable(this)">
    <span class="expandable-preview">${safe}</span>
    <span class="expandable-full">${safe}</span>
    <span class="expandable-hint">Voir plus</span>
  </button>`;
}

function toggleExpandable(button) {
  const expanded = button.classList.toggle("expanded");
  button.setAttribute("aria-expanded", String(expanded));
  const hint = button.querySelector(".expandable-hint");
  if (hint) hint.textContent = expanded ? "Voir moins" : "Voir plus";
}

function fmtDateTime(s) {
  if (!s) return "-";
  return new Date(s).toLocaleString("fr-FR", {
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
  });
}

// Initial load
document.getElementById("reminders-status").addEventListener("change", loadReminders);
document.getElementById("load-more-messages").addEventListener("click", () => loadMessages(false));
loadStats();
loadChats();
loadMessages(false);
loadToolCalls();
loadReminders();
</script>
