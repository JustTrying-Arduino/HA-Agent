name: "My Agent"
description: "Minimalist AI agent with Telegram interface and tool execution"
version: "0.4.4"
slug: "my-agent"
url: "https://github.com/home-assistant/addons-example"

arch:
  - amd64
  - aarch64

startup: application
boot: auto
init: false
homeassistant_api: true

ingress: true
ingress_port: 8099
panel_icon: "mdi:robot"
panel_title: "My Agent"

map:
  - share:rw

options:
  openai_api_key: ""
  openai_api_base: "https://api.openai.com/v1"
  openai_model: "gpt-4.1"
  openai_model_light: "gpt-4.1-mini"
  groq_api_key: ""
  brave_api_key: ""
  degiro_username: ""
  degiro_password: ""
  degiro_totp_seed: ""
  telegram_bot_token: ""
  telegram_allowed_chat_ids: ""
  session_timeout_hours: 48
  max_session_messages: 15
  include_recent_tool_calls: true
  log_level: "info"
  ha_expose_label: "agent"

schema:
  openai_api_key: str
  openai_api_base: url
  openai_model: str
  openai_model_light: str
  groq_api_key: str?
  brave_api_key: str?
  degiro_username: str?
  degiro_password: password?
  degiro_totp_seed: password?
  telegram_bot_token: str
  telegram_allowed_chat_ids: str
  session_timeout_hours: int
  max_session_messages: int
  include_recent_tool_calls: bool
  log_level: list(debug|info|warning|error)
  ha_expose_label: str?
