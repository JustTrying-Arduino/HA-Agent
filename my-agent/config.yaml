name: "My Agent"
description: "Minimalist AI agent with Telegram interface and tool execution"
version: "0.1.0"
slug: "my-agent"
url: "https://github.com/home-assistant/addons-example"

arch:
  - amd64
  - aarch64

startup: application
boot: auto

ingress: true
ingress_port: 8099
panel_icon: "mdi:robot"
panel_title: "My Agent"

map:
  - share:rw

options:
  openai_api_key: ""
  openai_api_base: "https://api.openai.com/v1"
  openai_model: "gpt-4.1"
  groq_api_key: ""
  brave_api_key: ""
  telegram_bot_token: ""
  telegram_allowed_chat_ids: ""
  session_timeout_hours: 48
  max_session_messages: 15
  log_level: "info"

schema:
  openai_api_key: str
  openai_api_base: url
  openai_model: str
  groq_api_key: str?
  brave_api_key: str?
  telegram_bot_token: str
  telegram_allowed_chat_ids: str
  session_timeout_hours: int
  max_session_messages: int
  log_level: list(debug|info|warning|error)
